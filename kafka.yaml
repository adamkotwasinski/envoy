static_resources:
  listeners:
  - address:
      socket_address:
        address: 127.0.0.1
        port_value: 7001
    filter_chains:
    - filters:
      - name: envoy.filters.network.redis
        typed_config:
          "@type": type.googleapis.com/envoy.config.filter.network.redis_proxy.v2.RedisProxy
          stat_prefix: redis_proxy
          settings:
            op_timeout: 5s
          prefix_routes:
            catch_all_route:
              cluster: redis_cluster
  - address:
      socket_address:
        address: 127.0.0.1
        port_value: 19092
    filter_chains:
    - filters:
      - name: envoy.filters.network.kafka_mesh
        config:
          stat_prefix: myfilter1
  - address:
      socket_address:
        address: 127.0.0.1
        port_value: 19093
    filter_chains:
    - filters:
      - name: envoy.filters.network.kafka_broker
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.kafka_broker.v3.KafkaBroker
          stat_prefix: exampleprefix
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: tcp
          cluster: localkafka
  clusters:
  - name: redis_cluster
    connect_timeout: 0.25s
    type: strict_dns
    lb_policy: MAGLEV
    load_assignment:
      cluster_name: redis_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 7000
  - name: localkafka_m
    connect_timeout: 0.25s
    hosts:
    - socket_address:
        address: 127.0.0.1
        port_value: 9092
    - socket_address:
        address: 127.0.0.1
        port_value: 9093
    cluster_type:
      name: envoy.clusters.kafka
      typed_config:
        "@type": type.googleapis.com/google.protobuf.Struct
  - name: localkafka_b
    connect_timeout: 0.25s
    type: strict_dns
    lb_policy: round_robin
    load_assignment:
      cluster_name: some_service
      endpoints:
        - lb_endpoints:
          - endpoint:
              address:
                socket_address:
                  address: 127.0.0.1
                  port_value: 9092
admin:
  access_log_path: /dev/null
  profile_path: /dev/null
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }

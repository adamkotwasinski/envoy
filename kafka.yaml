static_resources:

  listeners:
  - address:
      socket_address:
        address: 127.0.0.1
        port_value: 19092
    filter_chains:
    - filters:
      - name: envoy.filters.network.kafka_mesh
        config:
          advertised_listener: "127.0.0.1:9092"
          forwarding_rules:
          - target_cluster: kafka_c1
            topic_prefix: apples
          - target_cluster: kafka_c2
            topic_prefix: bananas
          - target_cluster: kafka_c3
            topic_prefix: cherries

admin:
  access_log_path: /dev/null
  profile_path: /dev/null
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }
